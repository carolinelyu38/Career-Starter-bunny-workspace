<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EA Workspace</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap');
:root{--bg:#0f0f13;--panel:#16161d;--card:#1c1c26;--border:#2a2a3a;--accent:#c8a96e;--accentSoft:#c8a96e22;--accentGrad:linear-gradient(135deg,#c8a96e,#d8bd86);--onAccent:#111;--text:#e8e4d9;--muted:#6b6880;--radius:11px;--bgGrad:none;--font:'DM Sans','Noto Sans SC',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;overflow:hidden;background-attachment:fixed;}
::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
input,select,button{font-family:inherit;outline:none;}input::placeholder{color:var(--muted);}
.overlay{position:fixed;inset:0;background:rgba(8,8,12,.86);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:18px;width:100%;max-width:480px;padding:30px;animation:rise .3s ease;max-height:94vh;overflow-y:auto;}
@keyframes rise{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.modal h1{font-size:21px;color:var(--accent);margin-bottom:6px;}
.modal .sub{color:var(--muted);font-size:13px;margin-bottom:20px;line-height:1.6;}
.field{margin-bottom:15px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;}
.field input,.field select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 13px;color:var(--text);font-size:14px;color-scheme:dark;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5;}
.btn{background:var(--accentGrad);color:var(--onAccent);border:none;border-radius:10px;padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer;width:100%;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.status{margin-top:14px;font-size:13px;padding:11px 14px;border-radius:9px;line-height:1.5;display:none;word-break:break-word;}
.status.show{display:block;}
.status.ok{background:#6fcf7415;border:1px solid #6fcf7455;color:#6fcf74;}
.status.err{background:#ff707015;border:1px solid #ff707055;color:#ff7070;}
.status.load{background:var(--accentSoft);border:1px solid var(--accent);color:var(--accent);}
.cors-note{background:#f5a62311;border:1px solid #f5a62344;border-radius:9px;padding:11px 13px;font-size:11.5px;color:#f5c97a;line-height:1.6;margin-top:16px;}
.langtoggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:18px;width:fit-content;}
.langtoggle button{background:transparent;color:var(--muted);border:none;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;}
.langtoggle button.on{background:var(--accentGrad);color:var(--onAccent);}
.app{display:none;height:100vh;flex-direction:column;}.app.show{display:flex;}
.topbar{border-bottom:1px solid var(--border);background:var(--panel);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.topbar .title{font-size:18px;font-weight:700;color:var(--accent);}
.topbar .meta{font-size:11px;color:var(--muted);margin-top:2px;}
.topbar .actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.seg{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.seg button{background:transparent;color:var(--muted);border:none;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;}
.seg button.on{background:var(--accentGrad);color:var(--onAccent);}
.add-btn{background:var(--accentGrad);color:var(--onAccent);border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;}
.icon-btn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:7px 13px;font-size:12.5px;cursor:pointer;}
.addbar{background:var(--panel);border-bottom:1px solid var(--border);padding:16px 22px;display:none;gap:12px;flex-wrap:wrap;align-items:flex-end;animation:rise .2s ease;}
.addbar.show{display:flex;}
.addbar .ff{display:flex;flex-direction:column;gap:4px;}.addbar .ff span{font-size:11px;color:var(--muted);}
.addbar input,.addbar select{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-size:13px;color-scheme:dark;}
.body{display:flex;flex:1;min-height:0;}
.sidebar{width:312px;min-width:250px;border-right:1px solid var(--border);background:var(--panel);overflow-y:auto;padding:16px 14px;}
.daygroup{margin-bottom:18px;}.daylabel{font-size:11px;color:var(--accent);letter-spacing:.1em;font-weight:700;margin-bottom:8px;padding-left:2px;}
.task{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.18s;}
.task.active{background:var(--accentSoft);border-color:var(--accent);}
.task .t-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;}
.task .t-title{font-weight:600;font-size:14px;flex:1;}
.task .t-row{display:flex;align-items:center;margin-top:8px;gap:10px;}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;white-space:nowrap;}
.pill{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;cursor:pointer;white-space:nowrap;user-select:none;}
.main{flex:1;overflow-y:auto;padding:24px 28px;background:transparent;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60%;gap:13px;opacity:.6;}
.detail{max-width:740px;animation:fade .25s ease;}
.detail h2{font-size:22px;font-weight:700;margin-bottom:7px;}
.detail .d-meta{display:flex;gap:10px;align-items:center;color:var(--muted);font-size:12px;flex-wrap:wrap;}
.detail .d-note{margin-top:13px;padding:10px 14px;background:var(--accentSoft);border:1px solid var(--accent);border-radius:var(--radius);font-size:12px;color:var(--accent);}
.sec{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:15px 17px;margin-top:11px;}
.sec.err-b{border-color:#ff4d4d55;}
.sec .s-head{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--accent);margin-bottom:9px;}
.sec .s-body{font-size:13.5px;line-height:1.75;white-space:pre-wrap;}
.sec .s-load{color:var(--muted);font-size:13px;display:flex;align-items:center;gap:8px;}
.sec .s-err{color:#ff7070;font-size:12.5px;line-height:1.6;margin-bottom:9px;word-break:break-word;}
.retry{background:transparent;color:var(--accent);border:1px solid var(--accent);border-radius:6px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;}
.calhead{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.navbtn{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:8px;width:36px;height:36px;font-size:18px;cursor:pointer;}
.calgrid{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.calrow{display:grid;grid-template-columns:repeat(7,1fr);}
.calwk{padding:10px 0;text-align:center;font-size:12px;font-weight:700;color:var(--muted);border-bottom:1px solid var(--border);}
.calcell{height:104px;overflow:hidden;padding:6px 6px 8px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .15s;}
.calcell:hover{background:var(--accentSoft);}
.calcell.today{background:var(--accentSoft);}
.calchip{border-radius:6px;padding:3px 6px;margin-bottom:3px;font-size:11px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tmodal-ov{position:fixed;inset:0;background:rgba(8,8,12,.7);backdrop-filter:blur(4px);display:flex;align-items:flex-start;justify-content:center;z-index:50;padding:40px 18px;overflow-y:auto;}
.tmodal{background:var(--panel);border:1px solid var(--border);border-radius:calc(var(--radius) + 4px);padding:22px 24px;max-width:760px;width:100%;animation:fade .2s;}
.sharemodal-ov{position:fixed;inset:0;background:rgba(8,8,12,.8);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:60;padding:18px;}
.sharemodal{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;max-width:520px;width:100%;animation:fade .2s;}
/* theme palette */
.colpick{flex:1;text-align:center;font-size:12px;color:var(--muted);}
.colpick input[type=color]{width:100%;height:46px;border:1px solid var(--border);border-radius:10px;background:none;cursor:pointer;margin-top:6px;padding:3px;}
.presetchip{padding:7px 13px;border:none;border-radius:9px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;text-shadow:0 1px 2px rgba(0,0,0,.45);}
</style>
</head>

</div>

<div class="app" id="app">

</div>

/* color helpers */
function h2r(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function r2h(a){return '#'+a.map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join('');}
function mix(a,b,t){const A=h2r(a),B=h2r(b);return r2h(A.map((x,i)=>x+(B[i]-x)*t));}
function darken(h,t){return mix(h,'#000000',t);}
function lighten(h,t){return mix(h,'#ffffff',t);}
function lum(h){const v=h2r(h).map(x=>{x/=255;return x<=.03928?x/12.92:Math.pow((x+.055)/1.055,2.4);});return .2126*v[0]+.7152*v[1]+.0722*v[2];}
function sat(h){const v=h2r(h).map(x=>x/255);const mx=Math.max(...v),mn=Math.min(...v);return mx===0?0:(mx-mn)/mx;}
function deriveTheme(pal){
  pal=pal.slice(0,3);
  let accent=pal.slice().sort((a,b)=>(sat(b)+lum(b))-(sat(a)+lum(a)))[0];
  if(lum(accent)<0.16) accent=lighten(accent,0.3);
  let blend=pal.reduce((a,c,i)=>i===0?c:mix(a,c,0.5));
  const bgStops=pal.map(c=>darken(c,0.82));
  const bgGrad=`linear-gradient(140deg, ${bgStops.join(', ')})`;
  const accentGrad=`linear-gradient(135deg, ${pal.join(', ')})`;
  return {bg:bgStops[0],panel:darken(blend,0.76),card:darken(blend,0.68),border:lighten(darken(blend,0.62),0.10),
    accent,accentGrad,onAccent:lum(accent)>0.6?'#111':'#fff',text:'#f3efe6',muted:mix('#f3efe6',darken(blend,0.68),0.55),
    radius:13,bgGrad,name:'Custom',palette:pal};
}

function promptFor(title,key){

    ? `求助者昵称「${profile.nick||'Bunny'}」${profile.job?('，职业是'+profile.job):''}${profile.field?('，从事'+profile.field+'领域'):''}。${profile.field?'请结合该领域的实际情况给出更贴合的建议。':''}`

  const role=lang==='zh'
    ?`你是一位经验丰富的职场导师，正在帮助一位助理。${who}任务名称：「${title}」。要求：用中文回答；只给最终的专业答案，不要写思考过程、推理或开场白；不要使用任何 Markdown 或加粗（不要出现 * 号 或 # 号），纯文本；务必在篇幅内把话说完整，最后一句必须是完整句子。`
    :`You are an experienced workplace mentor helping an assistant. ${who} Task: "${title}". Rules: answer in English; give ONLY the final professional answer, no reasoning or preamble; do NOT use any Markdown or bold (no * or #), plain text only; finish completely and end on a complete sentence.`;
  const m=lang==='zh'?{
    what:`${role}简洁解释这个任务做什么、目的和重要性，100字以内。`,
    how:`${role}列出关键步骤，3-5步，每步一行加序号。`,
    resources:`${role}列出可参考的资料/文件/信息来源，格式「• 名称：用途」，3-5条。`,
    tools:`${role}列出可用的软件工具或平台，格式「• 工具：用途」，3-5条。`,
    template:`${role}给出一个可直接套用的简单文字模板或格式示例，排版清晰。`,
  }:{
    what:`${role}Briefly explain what this task is, its purpose and importance, under 80 words.`,
    how:`${role}List the key steps, 3-5 steps, one per line, numbered.`,
    resources:`${role}List references/documents/sources to use, format "• Name: purpose", 3-5 items.`,
    tools:`${role}List software tools or platforms to use, format "• Tool: purpose", 3-5 items.`,
    template:`${role}Provide a simple ready-to-use text template or format example, clearly laid out.`,
  };return m[key];}

async function callLLM(content){
  const c=state.conn,ep=c.endpoint.replace(/\/+$/,'');
  if(c.format==='gemini'){
    const url=`${ep}/models/${c.model}:generateContent?key=${encodeURIComponent(c.apiKey)}`;
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:content}]}],generationConfig:{maxOutputTokens:2048,temperature:0.6}})});
    if(!res.ok)throw new Error('HTTP '+res.status+'：'+(await res.text()).slice(0,300));
    const d=await res.json();return d.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('')||'(empty)';
  }else if(c.format==='anthropic'){
    const url=/\/messages$/.test(ep)?ep:ep+'/v1/messages';
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':c.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:c.model,max_tokens:2048,messages:[{role:'user',content}]})});
    if(!res.ok)throw new Error('HTTP '+res.status+'：'+(await res.text()).slice(0,300));
    const d=await res.json();return (d.content||[]).map(b=>b.text||'').join('')||'(empty)';
  }else{
    const url=/(chat\/completions|completions)$/.test(ep)?ep:ep+'/chat/completions';
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+c.apiKey},body:JSON.stringify({model:c.model,max_tokens:2048,messages:[{role:'user',content}]})});
    if(!res.ok)throw new Error('HTTP '+res.status+'：'+(await res.text()).slice(0,300));
    const d=await res.json();return d.choices?.[0]?.message?.content||'(empty)';
  }
}

/* AI — answers cached per language; fixed once generated */
function aiL(id){state.ai[id]=state.ai[id]||{};state.ai[id][lang]=state.ai[id][lang]||{};return state.ai[id][lang];}
async function genAnswers(task,onlyKey){
  const id=task.id;aiL(id);state.loading[id]=state.loading[id]||{};
  const list=onlyKey?L().sections.filter(s=>s[0]===onlyKey):L().sections;
  list.forEach(s=>state.loading[id][s[0]]=true);renderMain();renderModal();
  // make sure we have a title in this language
  if(!(state.titleTr[id]&&state.titleTr[id][lang])) await translateTitles([task]);
  const title=displayTitle(task);
  for(const s of list){
    try{state.ai[id][lang][s[0]]={ok:true,text:cleanText(await callLLM(promptFor(title,s[0])))};}
    catch(e){state.ai[id][lang][s[0]]={ok:false,text:e.message};}
    state.loading[id][s[0]]=false;renderMain();renderModal();
  }
}
async function translateAnswers(task,fromLang){
  const id=task.id;aiL(id);state.loading[id]=state.loading[id]||{};
  const src=state.ai[id][fromLang];
  L().sections.forEach(s=>state.loading[id][s[0]]=true);renderMain();renderModal();
  for(const s of L().sections){
    const k=s[0];const srcText=src&&src[k]&&src[k].ok?src[k].text:null;
    if(srcText==null){ // nothing to translate from -> generate
      try{state.ai[id][lang][k]={ok:true,text:cleanText(await callLLM(promptFor(displayTitle(task),k)))};}catch(e){state.ai[id][lang][k]={ok:false,text:e.message};}
    }else{
      const tp=lang==='zh'?`把下面内容翻译成中文，只输出翻译结果，保持纯文本、不要加粗或Markdown：\n\n${srcText}`
                          :`Translate the following into English. Output only the translation, plain text, no bold or Markdown:\n\n${srcText}`;
      try{state.ai[id][lang][k]={ok:true,text:cleanText(await callLLM(tp))};}catch(e){state.ai[id][lang][k]={ok:false,text:srcText};}
    }
    state.loading[id][k]=false;renderMain();renderModal();
  }
  // translate Q&A too
  if(state.qa[id]&&state.qa[id][fromLang]&&state.qa[id][fromLang].length){
    state.qa[id][lang]=state.qa[id][lang]||[];
    for(const qa of state.qa[id][fromLang]){
      const tq=lang==='zh'?`把这段问答翻译成中文，纯文本：\n问：${qa.q}\n答：${qa.a}`:`Translate this Q&A into English, plain text:\nQ: ${qa.q}\nA: ${qa.a}`;
      try{state.qa[id][lang].push({q:'',a:cleanText(await callLLM(tq))});}catch(e){}
    }
    renderMain();renderModal();
  }
}
function ensureAI(task){
  const id=task.id;const cur=state.ai[id]&&state.ai[id][lang];
  const allOk=cur&&L().sections.every(s=>cur[s[0]]&&cur[s[0]].ok);
  if(allOk)return;
  const other=lang==='zh'?'en':'zh';
  const otherOk=state.ai[id]&&state.ai[id][other]&&L().sections.every(s=>state.ai[id][other][s[0]]&&state.ai[id][other][s[0]].ok);
  if(otherOk) translateAnswers(task,other); else genAnswers(task);
}
async function translateTitles(tasks){
  const need=tasks.filter(x=>!(state.titleTr[x.id]&&state.titleTr[x.id][lang]));
  if(need.length===0)return;
  try{
    const listStr=need.map((x,i)=>`${i+1}. ${x.title}`).join('\n');
    const tp=lang==='zh'?`把下面每行任务名翻译成中文，按相同顺序只输出一个JSON字符串数组，不要其它文字：\n${listStr}`
                        :`Translate each task name below into English. Output ONLY a JSON array of strings in the same order, nothing else:\n${listStr}`;
    let raw=await callLLM(tp);raw=raw.replace(/```json|```/g,'').trim();
    const arr=JSON.parse(raw.slice(raw.indexOf('['),raw.lastIndexOf(']')+1));
    need.forEach((x,i)=>{state.titleTr[x.id]=state.titleTr[x.id]||{};state.titleTr[x.id][lang]=arr[i]||x.title;});
  }catch(e){ need.forEach(x=>{state.titleTr[x.id]=state.titleTr[x.id]||{};state.titleTr[x.id][lang]=x.title;}); }
  renderSidebar();renderMain();renderModal();if(view==='calendar')renderCal();
}
window.retrySec=(id,key)=>genAnswers(state.tasks.find(x=>x.id===id),key);
window.selectTask=id=>{state.selectedId=id;renderSidebar();renderMain();ensureAI(state.tasks.find(x=>x.id===id));};
window.openModal=id=>{state.modalId=id;renderModal();ensureAI(state.tasks.find(x=>x.id===id));};
window.closeModal=()=>{state.modalId=null;renderModal();};
window.askQ=async(id)=>{
  const task=state.tasks.find(x=>x.id===id);const q=(prompt(L().askPh)||'').trim();if(!q)return;
  state.qa[id]=state.qa[id]||{};state.qa[id][lang]=state.qa[id][lang]||[];
  state.qa[id][lang].push({q,a:'__loading__'});renderMain();renderModal();
  const idx=state.qa[id][lang].length-1;
  const who=lang==='zh'?`你在帮助助理「${profile.nick}」${profile.field?('（'+profile.field+'领域）'):''}处理任务「${displayTitle(task)}」。`:`You are helping assistant "${profile.nick}"${profile.field?(' in '+profile.field):''} with the task "${displayTitle(task)}".`;
  const pr=(lang==='zh'?`${who}请回答她的追问，用中文，纯文本不要加粗：${q}`:`${who} Answer the follow-up in English, plain text no bold: ${q}`);
  try{state.qa[id][lang][idx].a=cleanText(await callLLM(pr));}catch(e){state.qa[id][lang][idx].a='⚠ '+e.message;}
  renderMain();renderModal();
};

function statusPill(task){return `<span class="pill" title="${L().clickStatus}" onclick="cycleStatus(${task.id},event)" style="background:${STATUS_COLOR[task.status]}22;border:1px solid ${STATUS_COLOR[task.status]};color:${STATUS_COLOR[task.status]}">${task.status==='done'?'✓ ':task.status==='inprogress'?'● ':'○ '}${L()[task.status]}</span>`;}
function renderSidebar(){
  if(!$('sidebar'))return;const t=L();
  if(state.tasks.length===0){$('sidebar').innerHTML=`<div style="color:var(--muted);font-size:13px;padding:8px 2px;line-height:1.7">${t.noTasks}</div>`;return;}
  const g={};state.tasks.forEach(x=>{(g[x.date]=g[x.date]||[]).push(x);});
  let h=`<div style="font-size:11px;color:var(--muted);letter-spacing:.1em;margin-bottom:14px;padding-left:2px">${t.count(state.tasks.length)}</div>`;
  Object.keys(g).sort().forEach(date=>{h+=`<div class="daygroup"><div class="daylabel">📅 ${date}</div>`;
    g[date].forEach(x=>{const[bc,tc]=PRI[x.priority];const a=state.selectedId===x.id?' active':'';
      h+=`<div class="task${a}" onclick="selectTask(${x.id})" style="opacity:${x.status==='done'?.62:1}">
        <div class="t-top"><div class="t-title" style="text-decoration:${x.status==='done'?'line-through':'none'}">${esc(displayTitle(x))}</div>
        <span class="badge" style="background:${bc}22;border:1px solid ${bc};color:${tc}">${t[x.priority]}</span></div>
        <div class="t-row"><span style="color:var(--muted);font-size:12px">🕐 ${x.time}${x.due?` · ⏳${fmtDue(x.due)}`:""}</span>${statusPill(x)}
        <span onclick="delTask(${x.id},event)" title="${t.del}" style="margin-left:auto;cursor:pointer;color:var(--muted);font-size:13px">🗑</span></div></div>`;});
    h+=`</div>`;});
  $('sidebar').innerHTML=h;
}
function detailHTML(task){const t=L();const[bc,tc]=PRI[task.priority];const cur=(state.ai[task.id]&&state.ai[task.id][lang])||{};
  let h=`<div class="detail"><h2>${esc(displayTitle(task))}</h2>
    <div class="d-meta"><span class="badge" style="background:${bc}22;border:1px solid ${bc};color:${tc}">${t[task.priority]}</span>${statusPill(task)}<span>${task.date} · ${task.time}</span>${task.due?`<span style="color:#ffd27a">⏳ ${t.dueLabel} ${fmtDue(task.due)}</span>`:""}</div>
    <div class="d-note">${t.note}</div>`;
  t.sections.forEach(([key,ic,title])=>{const d=cur[key];const ld=state.loading[task.id]&&state.loading[task.id][key];const err=d&&!d.ok;
    let inner;if(ld)inner=`<div class="s-load"><span class="spin"></span> ${t.analyzing}</div>`;
    else if(err)inner=`<div class="s-err">⚠ ${esc(d.text)}</div><button class="retry" onclick="retrySec(${task.id},'${key}')">${t.retry}</button>`;
    else if(d)inner=`<div class="s-body">${esc(d.text)}</div>`;else inner=`<div class="s-load">${t.waiting}</div>`;
    h+=`<div class="sec${err?' err-b':''}"><div class="s-head"><span style="font-size:15px">${ic}</span>${title}</div>${inner}</div>`;});
  // Q&A
  const qas=(state.qa[task.id]&&state.qa[task.id][lang])||[];
  qas.forEach(qa=>{h+=`<div class="sec"><div class="s-head"><span style="font-size:15px">💬</span>${qa.q?esc(qa.q):'Q&A'}</div><div class="s-body">${qa.a==='__loading__'?`<span class="spin"></span> ${t.analyzing}`:esc(qa.a)}</div></div>`;});
  h+=`<button class="retry" style="margin-top:12px;padding:8px 16px" onclick="askQ(${task.id})">${t.ask}</button>`;
  return h+`</div>`;}
function renderMain(){if(!$('main'))return;const t=L();const task=state.tasks.find(x=>x.id===state.selectedId);
  if(!task){$('main').innerHTML=`<div class="empty"><div style="font-size:38px">✦</div><div style="font-size:18px;color:var(--accent);font-weight:700">${t.emptyT}</div><div style="font-size:13px;color:var(--muted)">${t.emptyS}</div></div>`;return;}
  $('main').innerHTML=detailHTML(task);}
function renderModal(){if(state.modalId==null){$('modalRoot').innerHTML='';return;}
  const task=state.tasks.find(x=>x.id===state.modalId);if(!task){$('modalRoot').innerHTML='';return;}
  $('modalRoot').innerHTML=`<div class="tmodal-ov" onclick="closeModal()"><div class="tmodal" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:flex-end;margin-bottom:-6px"><button onclick="closeModal()" style="background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:16px">✕</button></div>
    ${detailHTML(task)}</div></div>`;}
function renderCal(){const t=L();const mat=monthMatrix(cal.y,cal.m);
  const byDate={};state.tasks.forEach(x=>{(byDate[x.date]=byDate[x.date]||[]).push(x);});
  Object.values(byDate).forEach(a=>a.sort((x,z)=>x.time.localeCompare(z.time)));
  const todayStr=dstr(now.getFullYear(),now.getMonth(),now.getDate());
  let h=`<div class="calhead"><button class="navbtn" onclick="calNav(-1)">‹</button>
    <div style="font-size:20px;font-weight:700;color:var(--accent);min-width:150px;text-align:center">${t.monthLabel(cal.y,cal.m)}</div>
    <button class="navbtn" onclick="calNav(1)">›</button>
    <button class="navbtn" style="width:auto;padding:0 14px;font-size:13px" onclick="calToday()">${t.today}</button>
    <button onclick="openShare()" style="margin-left:auto;background:var(--accentGrad);color:var(--onAccent);border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer">📤 ${t.share}</button>
  </div><div class="calgrid"><div class="calrow">`;
  t.weekdays.forEach(w=>h+=`<div class="calwk">${w}</div>`);h+=`</div>`;
  mat.forEach((week,wi)=>{h+=`<div class="calrow">`;week.forEach((day,di)=>{const ds=day?dstr(cal.y,cal.m,day):null;const list=ds?(byDate[ds]||[]):[];const today=ds===todayStr;
    const clickable=day?` onclick="expandDay('${ds}')" style="cursor:pointer;${di===6?'border-right:none;':''}${wi===mat.length-1?'border-bottom:none;':''}"`:` style="${di===6?'border-right:none;':''}${wi===mat.length-1?'border-bottom:none;':''}"`;
    h+=`<div class="calcell${today?' today':''}"${clickable}>`;
    if(day)h+=`<div style="font-size:12px;font-weight:${today?700:500};color:${today?'var(--accent)':'var(--muted)'};margin-bottom:4px;padding-left:3px">${day}</div>`;
    list.slice(0,2).forEach(tk=>{const[bc]=PRI[tk.priority];
      h+=`<div class="calchip" onclick="event.stopPropagation();openModal(${tk.id})" title="${esc(tk.title)}" style="background:${bc}22;border-left:3px solid ${bc};text-decoration:${tk.status==='done'?'line-through':'none'};opacity:${tk.status==='done'?.6:1}"><span style="color:var(--muted)">${tk.time}</span> ${esc(tk.title)}</div>`;});
    if(list.length>2)h+=`<div style="font-size:10px;color:var(--accent);padding-left:3px;font-weight:600">${t.moreTasks(list.length-2)}</div>`;
    h+=`</div>`;});h+=`</div>`;});
  h+=`</div>`;$('calView').innerHTML=h;}
window.expandDay=ds=>{const t=L();const list=state.tasks.filter(x=>x.date===ds).sort((a,b)=>a.time.localeCompare(b.time));
  if(list.length===0)return;
  let h=`<div class="tmodal-ov" onclick="closeDay()"><div class="tmodal" style="max-width:440px" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:17px;font-weight:700;color:var(--accent)">📅 ${ds}</div>
    <button onclick="closeDay()" style="background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:16px">✕</button></div>`;
  list.forEach(tk=>{const[bc,tc]=PRI[tk.priority];
    h+=`<div onclick="closeDay();openModal(${tk.id})" style="background:var(--card);border:1px solid var(--border);border-left:3px solid ${bc};border-radius:10px;padding:11px 13px;margin-bottom:8px;cursor:pointer">
      <div style="font-weight:600;font-size:14px;text-decoration:${tk.status==='done'?'line-through':'none'}">${esc(tk.title)}</div>
      <div style="color:var(--muted);font-size:12px;margin-top:5px">🕐 ${tk.time}${tk.due?` · ⏳${fmtDue(tk.due)}`:''} · <span style="color:${STATUS_COLOR[tk.status]}">${t[tk.status]}</span></div></div>`;});
  h+=`</div></div>`;$('dayRoot').innerHTML=h;};
window.closeDay=()=>{$('dayRoot').innerHTML='';};
window.calNav=d=>{let m=cal.m+d;if(m<0)cal={y:cal.y-1,m:11};else if(m>11)cal={y:cal.y+1,m:0};else cal={y:cal.y,m};renderCal();};
window.calToday=()=>{cal={y:now.getFullYear(),m:now.getMonth()};renderCal();};

/* share image */
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function clip(ctx,s,maxW){if(ctx.measureText(s).width<=maxW)return s;let r=s;while(r.length>1&&ctx.measureText(r+'…').width>maxW)r=r.slice(0,-1);return r+'…';}
function buildImg(){const t=L();const cols=7,cellW=176,cellH=116,headH=84,wkH=36,pad=26;
  const mat=monthMatrix(cal.y,cal.m),rows=mat.length;
  const W=pad*2+cols*cellW,H=pad*2+headH+wkH+rows*cellH,s=2;
  const cv=document.createElement('canvas');cv.width=W*s;cv.height=H*s;const ctx=cv.getContext('2d');ctx.scale(s,s);
  if(theme.palette){const g=ctx.createLinearGradient(0,0,W,H);const st=theme.palette.map(c=>darken(c,0.82));st.forEach((c,i)=>g.addColorStop(st.length===1?0:i/(st.length-1),c));ctx.fillStyle=g;}else ctx.fillStyle=theme.bg;
  ctx.fillRect(0,0,W,H);ctx.textBaseline='top';
  ctx.fillStyle=theme.accent;ctx.font="700 30px 'Helvetica Neue',Arial,sans-serif";ctx.fillText('✦ '+t.monthLabel(cal.y,cal.m),pad,pad+6);
  ctx.fillStyle=theme.muted;ctx.font="500 14px Arial,sans-serif";ctx.fillText(t.a_title.replace('✦ ',''),pad,pad+48);
  const gx=pad,gy=pad+headH;ctx.font="700 14px Arial,sans-serif";ctx.textAlign='center';
  for(let c=0;c<cols;c++){ctx.fillStyle=theme.muted;ctx.fillText(t.weekdays[c],gx+c*cellW+cellW/2,gy+10);}
  ctx.textAlign='left';
  const byDate={};state.tasks.forEach(x=>{(byDate[x.date]=byDate[x.date]||[]).push(x);});
  Object.values(byDate).forEach(a=>a.sort((x,z)=>x.time.localeCompare(z.time)));
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const x=gx+c*cellW,yy=gy+wkH+r*cellH,day=mat[r][c];
    ctx.strokeStyle=theme.border;ctx.lineWidth=1;ctx.strokeRect(x,yy,cellW,cellH);if(!day)continue;
    ctx.fillStyle=theme.text;ctx.font="600 14px Arial,sans-serif";ctx.fillText(String(day),x+10,yy+8);
    const ds=dstr(cal.y,cal.m,day),list=byDate[ds]||[];let cy=yy+30;
    list.slice(0,3).forEach(tk=>{const[bc]=PRI[tk.priority];ctx.fillStyle=bc+'44';roundRect(ctx,x+8,cy,cellW-16,22,6);ctx.fill();
      ctx.fillStyle=theme.text;ctx.font="500 11px Arial,sans-serif";ctx.fillText(clip(ctx,tk.time+' '+tk.title,cellW-24),x+13,cy+5);cy+=26;});
    if(list.length>3){ctx.fillStyle=theme.muted;ctx.font="500 11px Arial,sans-serif";ctx.fillText(t.moreTasks(list.length-3),x+13,cy+2);}}
  return cv.toDataURL('image/png');}
window.openShare=()=>{const t=L();const url=buildImg();window.__shareUrl=url;
  $('shareRoot').innerHTML=`<div class="sharemodal-ov" onclick="closeShare()"><div class="sharemodal" onclick="event.stopPropagation()">
    <div style="font-size:16px;font-weight:700;color:var(--accent);margin-bottom:4px">${t.shareTitle}</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">${t.shareTip}</div>
    <img src="${url}" style="width:100%;border-radius:10px;border:1px solid var(--border);margin-bottom:14px"/>
    <div style="display:flex;gap:10px">
      <button onclick="nativeShare()" style="flex:1;background:var(--accentGrad);color:var(--onAccent);border:none;border-radius:9px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">📤 ${t.nativeShare}</button>
      <button onclick="dlImg()" style="flex:1;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:9px;padding:10px;font-size:13px;font-weight:600;cursor:pointer">⬇ ${t.download}</button>
      <button onclick="closeShare()" style="background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:9px;padding:10px 14px;font-size:13px;cursor:pointer">${t.close}</button>
    </div></div></div>`;};
window.closeShare=()=>{$('shareRoot').innerHTML='';};
window.dlImg=()=>{const a=document.createElement('a');a.href=window.__shareUrl;a.download='calendar.png';a.click();};
window.nativeShare=async()=>{try{const blob=await(await fetch(window.__shareUrl)).blob();const file=new File([blob],'calendar.png',{type:'image/png'});
  if(navigator.canShare&&navigator.canShare({files:[file]}))await navigator.share({files:[file],title:L().shareTitle});else dlImg();}catch(e){dlImg();}};

/* boot */
applyLang();
if(state.conn)enterApp();else $('connOverlay').style.display='flex';
</script>
